<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>S.E.A.S Simulation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="logo-container">
            <img src="images/logo.png" alt="S.E.A.S Logo" class="logo">
            <h1>S.E.A.S</h1>
        </div>
        <!-- Navigation Band -->
        <nav class="nav-band">
            <span id="dynamic-section">Pre-Quiz</span>
        </nav>
    </header>

    <!-- Simulation Container -->
    <div class="simulation-container">

        <!-- Quiz content -->
        <div id="content-area"></div>

        <!-- Navigation buttons for end of simulation/post-quiz -->
        <div id="navigation-buttons" style="margin-top:20px;"></div>

        <!-- Bottom navigation buttons -->
        <div class="bottom-buttons">
            <button id="submit-quiz-btn">Submit Quiz</button>
            <button id="next-btn" style="display:none;">Next: Simulation</button>
        </div>

    </div>

    <!-- JS Files -->
    <script src="js/quiz.js"></script>
    <script src="js/simulation.js"></script>

</body>

</html>
