<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - S.E.A.S</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <!-- Header
    <header class="header">
        <div class="header-top">
            <div class="logo-container">
                <img src="images/logo.png" alt="S.E.A.S Logo" class="logo">
                <h1>S.E.A.S</h1>
            </div>
        </div>
    </header> -->

    <!-- Main Login Section -->
    <main class="main-content">
        <section class="login-section">
            <h2>Login to S.E.A.S</h2>
            <div class="login-container">
                <span class="material-icons">person</span>
                <input type="text" placeholder="Username" />
            </div>
            <div class="login-container">
                <span class="material-icons">lock</span>
                <input type="password" placeholder="Password" />
                <p id="caps-warning-login" style="color:red; font-size:0.9em; display:none;">⚠️Caps Lock is ON</p>
            </div>
            <button class="login-btn">Login</button>
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        </section>
    </main>

</body>

<!-- Page content -->

<script>
    // Caps Lock detection for login page
    const loginPassword = document.getElementById('loginPassword');
    const capsWarning = document.getElementById('caps-warning-login');

    loginPassword.addEventListener('keyup', (event) => {
        if (event.getModifierState('CapsLock')) {
            capsWarning.style.display = 'block';
        } else {
            capsWarning.style.display = 'none';
        }
    });
</script>

</body>

</html>

</html>
